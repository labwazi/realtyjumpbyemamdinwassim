<!DOCTYPE html>
<html>
<head>
  <title>Realty Jump Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    canvas { display:block; margin:auto; background:linear-gradient(#6ec6ff,#fff); }

    #ui {
      position:absolute;
      top:5px;
      left:5px;
      background:rgba(0,0,0,0.6);
      color:white;
      padding:8px;
      border-radius:10px;
      font-size:12px;
    }

    #controls {
      position:absolute;
      bottom:0;
      width:100%;
      display:flex;
    }

    .btn {
      flex:1;
      padding:20px;
      text-align:center;
      font-size:20px;
      background:#333;
      color:white;
    }

    #menu {
      position:absolute;
      width:100%;
      top:40%;
      text-align:center;
    }

    button {
      padding:15px;
      font-size:18px;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>🏠 Realty Jump Mobile</h1>
  <button onclick="start()">Start</button>
</div>

<div id="ui"></div>

<canvas id="c" width="400" height="600"></canvas>

<div id="controls">
  <div class="btn" ontouchstart="moveLeft=true" ontouchend="moveLeft=false">⬅️</div>
  <div class="btn" ontouchstart="moveRight=true" ontouchend="moveRight=false">➡️</div>
</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let player,plats,obs;
let score=0,money=0,income=1;
let moveLeft=false,moveRight=false;
let started=false,gameOver=false;

function init(){
  player={x:180,y:500,w:40,h:40,dy:-12};
  plats=[]; obs=[];
  score=0; money=0;

  for(let i=0;i<10;i++){
    plats.push({x:Math.random()*320,y:i*60});
  }
}

function start(){
  document.getElementById("menu").style.display="none";
  init();
  started=true;
}

function update(){
  if(!started||gameOver)return;

  // MOBILE movement
  if(moveLeft) player.x-=5;
  if(moveRight) player.x+=5;

  // wrap
  if(player.x<0) player.x=360;
  if(player.x>360) player.x=0;

  // gravity
  player.dy+=0.35;
  player.y+=player.dy;

  // bounce
  if(player.dy>0){
    plats.forEach(p=>{
      if(player.x<p.x+70 && player.x+40>p.x &&
         player.y+40<p.y+10 &&
         player.y+40+player.dy>=p.y){
        player.dy=-11;
      }
    });
  }

  // scroll
  if(player.y<280){
    plats.forEach(p=>p.y+=4);
    obs.forEach(o=>o.y+=4);
    player.y=280;
    score++;
    money+=income;
  }

  // respawn
  plats.forEach(p=>{
    if(p.y>600){
      p.y=-10;
      p.x=Math.random()*320;
    }
  });

  // obstacles
  if(Math.random()<0.015){
    obs.push({x:Math.random()*380,y:-20});
  }
  obs.forEach(o=>o.y+=3);

  // hit
  obs.forEach(o=>{
    if(player.x<o.x+20 && player.x+40>o.x &&
       player.y<o.y+20 && player.y+40>o.y){
      gameOver=true;
    }
  });

  if(player.y>600) gameOver=true;

  updateUI();
}

function updateUI(){
  document.getElementById("ui").innerHTML=
    "🏆 "+score+"<br>💰 $"+money;
}

function draw(){
  ctx.clearRect(0,0,400,600);

  if(!started) return;

  ctx.fillStyle="green";
  plats.forEach(p=>{
    ctx.fillRect(p.x,p.y,60,10);
  });

  ctx.fillStyle="orange";
  ctx.fillRect(player.x,player.y,40,40);

  ctx.fillStyle="red";
  obs.forEach(o=>{
    ctx.fillRect(o.x,o.y,20,20);
  });

  if(gameOver){
    ctx.fillStyle="black";
    ctx.fillText("Game Over",150,300);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
